name: verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install script dependencies
        run: npm ci --prefix scripts
      - name: Rebuild (no-fix — mirrors local rebuild --no-fix, strict)
        run: node scripts/rebuild.mjs --no-fix
