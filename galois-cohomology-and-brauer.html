<script>
const $ = (s,r=document)=>r.querySelector(s);
const $$ = (s,r=document)=>[...r.querySelectorAll(s)];
const SVG = (tag,attrs={})=>{
  const e = document.createElementNS('http://www.w3.org/2000/svg',tag);
  for(const[k,v] of Object.entries(attrs)) e.setAttribute(k,v);
  return e;
};
// draw an arrow marker def once per svg (idempotent)
function ensureArrow(svg, id, color){
  let defs = svg.querySelector('defs');
  if(!defs){ defs = SVG('defs'); svg.appendChild(defs); }
  if(defs.querySelector('#'+id)) return;
  const mk = SVG('marker',{id,viewBox:'0 0 10 10',refX:9,refY:5,markerWidth:6,markerHeight:6,orient:'auto'});
  mk.appendChild(SVG('path',{d:'M0,0 L10,5 L0,10 z',fill:color}));
  defs.appendChild(mk);
}
// curved arrow between two pixel points, with optional label
function drawArrow(svg, p1, p2, opts={}){
  const {color='var(--ink)', curve=0, label=null, labelSide=1, markerId='arr-default', dash=null, width=1.5} = opts;
  ensureArrow(svg, markerId, color);
  const [x1,y1]=p1, [x2,y2]=p2;
  const dx=x2-x1, dy=y2-y1;
  const L = Math.hypot(dx,dy) || 1;
  const ux=dx/L, uy=dy/L;
  // shorten endpoints
  const pad1 = opts.pad1 ?? 14, pad2 = opts.pad2 ?? 16;
  const ax=x1+ux*pad1, ay=y1+uy*pad1;
  const bx=x2-ux*pad2, by=y2-uy*pad2;
  const mx=(ax+bx)/2 - uy*curve, my=(ay+by)/2 + ux*curve;
  const path = SVG('path',{
    d:`M${ax} ${ay} Q ${mx} ${my} ${bx} ${by}`,
    fill:'none', stroke:color, 'stroke-width':width,
    'marker-end':`url(#${markerId})`
  });
  if(dash) path.setAttribute('stroke-dasharray', dash);
  svg.appendChild(path);
  if(label){
    const t = SVG('text',{x:mx + (labelSide? -uy*8 : uy*8), y:my + (labelSide? ux*8 : -ux*8) + 4,
      'text-anchor':'middle','font-size':12, fill:color, 'font-style':'italic'});
    t.textContent = label;
    svg.appendChild(t);
  }
  return path;
}
function drawNode(svg, x, y, label, opts={}){
  const {r=18, fill='var(--panel2)', stroke='var(--blue)', textColor='#fff', fontSize=14} = opts;
  svg.appendChild(SVG('circle',{cx:x,cy:y,r,fill,stroke,'stroke-width':1.5}));
  const t = SVG('text',{x,y:y+fontSize*0.35,'text-anchor':'middle','font-size':fontSize,fill:textColor,'font-weight':600});
  t.textContent = label;
  svg.appendChild(t);
}
</script>

    const topnav = document.querySelector('nav.toc');
    if(!aside || !topnav) return;
    const srcs = [...topnav.querySelectorAll('a[href^="#"]')];
    if(!srcs.length) return;
    const title = document.createElement('div');
    title.className = 'sidetoc-title';
    title.textContent = 'On this page';
    aside.appendChild(title);
    const ol = document.createElement('ol');
    srcs.forEach(src => {
      const li = document.createElement('li');
      const a = document.createElement('a');
      a.href = src.getAttribute('href');
      a.textContent = src.textContent.replace(/\u00a0/g,' ').trim();
      li.appendChild(a); ol.appendChild(li);
    });
    aside.appendChild(ol);
    const links = [...aside.querySelectorAll('a')];
    const sections = [];
    links.forEach(a => {
      const id = a.getAttribute('href').slice(1);
      const s = document.getElementById(id);
      if(s) sections.push({a, s});
    });
    if(!sections.length) return;
    function update(){
      const threshold = 140;
      let activeLink = sections[0].a;
      for(const {a,s} of sections){
        if(s.getBoundingClientRect().top <= threshold) activeLink = a;
      }
      links.forEach(x => x.classList.remove('active'));
      activeLink.classList.add('active');
    }
    update();
    window.addEventListener('scroll', update, {passive:true});
    window.addEventListener('resize', update);
  }
  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', build);
  else build();
})();
</script>
